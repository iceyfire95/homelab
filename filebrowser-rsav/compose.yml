services:
  filebrowser-rsav:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser-rsav
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - ${NAS_BASE}/rsav-share:/srv
      - ./data/filebrowser.db:/database/filebrowser.db
      - ./data/settings.json:/config/settings.json
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.rsavfile.rule=Host(`rsavfile.${LOCAL_DOMAIN}`) || Host(`file.${RSAV_DOMAIN}`)"
      - "traefik.http.routers.rsavfile.entrypoints=https"
      - "traefik.http.routers.rsavfile.tls=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.services.rsavfile.loadbalancer.server.port=80"

networks:
  proxy:
    external: true
