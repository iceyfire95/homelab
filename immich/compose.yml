services:
  immich-server:
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    container_name: immich_server
    restart: unless-stopped
    depends_on:
      - redis
      - database
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
    volumes:
      - ${UPLOAD_LOCATION}:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    networks:
      - proxy
      - immich
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.immich-local.rule=Host(`immich.${LOCAL_DOMAIN}`) || Host(`immich.${BASE_DOMAIN}`)"
      - "traefik.http.routers.immich-local.entrypoints=https"
      - "traefik.http.routers.immich-local.tls=true"
      - "traefik.http.routers.immich-local.service=immich"
      - "traefik.docker.network=proxy"
      - "traefik.http.services.immich.loadbalancer.server.port=2283"
    healthcheck:
      disable: false

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    container_name: immich_machine_learning
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - model-cache:/cache
    networks:
      - immich
    healthcheck:
      disable: false

  redis:
    image: docker.io/valkey/valkey:8-bookworm@sha256:ff21bc0f8194dc9c105b769aeabf9585fea6a8ed649c0781caeac5cb3c247884
    container_name: immich_redis
    restart: unless-stopped
    networks:
      - immich
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    healthcheck:
      test: redis-cli ping || exit 1

  database:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.3.0-pgvectors0.2.0
    container_name: immich_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_DB=${DB_DATABASE_NAME}
      - POSTGRES_INITDB_ARGS='--data-checksums'
    volumes:
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
    networks:
      - immich

volumes:
  model-cache:

networks:
  proxy:
    external: true
  immich:
    external: true
