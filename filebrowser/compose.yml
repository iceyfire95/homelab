services:
  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser-ewcdigital
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - ${NAS_BASE}/filebrowser:/srv
      - ./data/filebrowser.db:/database/filebrowser.db
      - ./data/settings.json:/config/settings.json
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.filebrowser.rule=Host(`file.${LOCAL_DOMAIN}`) || Host(`file.${BASE_DOMAIN}`)"
      - "traefik.http.routers.filebrowser.entrypoints=https"
      - "traefik.http.routers.filebrowser.tls=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.services.filebrowser.loadbalancer.server.port=80"

networks:
  proxy:
    external: true
